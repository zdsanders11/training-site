<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- Fallback redirect in case JS is disabled -->
    <meta http-equiv="refresh" content="0; url=index.html">
    <script>
        // Redirect with query parameters and hash preserved
        window.location.replace("index.html" + window.location.search + window.location.hash);
    </script>
</head>
<body>
    <p>Redirecting to the new home page. <a href="index.html">Click here if not redirected.</a></p>
</body>
</html>
